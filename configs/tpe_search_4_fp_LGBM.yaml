experiment_name: tpe_search_4_fp_LGBM

search:
  type: tpe
  scoring: neg_root_mean_squared_error
  n_trials: 256                              
  cv_splits: 5
  refit: true
  seed: 42
  verbose: 0  
  direction: minimize

results:
  output_path: ./results
  metric: sklearn.metrics.root_mean_squared_error
  bootstrap_on_val: true
  display_parity_plot: true
  
param_space:
  data_representation:
    MACCS_167: {fp_name_or_path: MACCSKeysFingerprint_167}
    RDKit_2048: {fp_name_or_path: RDKitFingerprint_2048}
    AtomPair_2048: {fp_name_or_path: AtomPairFingerprint_2048}
    Avalon_1024: {fp_name_or_path: AvalonFingerprint_1024}
  model:
    lightgbm.LGBMRegressor:
      random_state: [42]
      verbose: [-1]
      n_estimators:
        type: int
        low: 200
        high: 1500
        log: true
      learning_rate:
        type: float
        low: 0.01
        high: 0.3
        log: true
      max_depth:
        type: int
        low: 3
        high: 10
      min_child_weight:
        type: int
        low: 2
        high: 20
      subsample:
        type: float
        low: 0.4
        high: 0.9
      colsample_by_tree:
        type: float
        low: 0.4
        high: 0.9
      gamma:
        type: float
        low: 0
        high: 1
      reg_alpha:
        type: float
        low: 0
        high: 5
      reg_lambda:
        type: float
        low: 0
        high: 10 