experiment_name: tpe_search_avalon_MLP

search:
  type: tpe
  scoring: neg_root_mean_squared_error
  n_trials: 32                          
  cv_splits: 5
  refit: true
  seed: 42
  verbose: 0  
  direction: minimize

results:
  output_path: ./results
  metric: sklearn.metrics.root_mean_squared_error
  bootstrap_on_val: true
  display_parity_plot: true
  
param_space:
  data_representation:
    Avalon_1024: {fp_name_or_path: AvalonFingerprint_1024}
  model:
    sklearn.neural_network.MLPRegressor:
      random_state: [42]
      early_stopping: [true]
      hidden_layer_sizes:
        - [128, 32]
      activation:
        - relu
        - tanh
      alpha:
        type: float
        low: 0.000001
        high: 1.0
        log: true
      learning_rate_init:
        type: float
        low: 0.00001
        high: 0.1
        log: true