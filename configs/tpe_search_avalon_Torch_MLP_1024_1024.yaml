experiment_name: tpe_search_avalon_Torch_MLP_1024_1024

search:
  type: tpe
  scoring: neg_root_mean_squared_error
  bootstrap_without_cv: true
  n_trials: 64                              
  cv_splits: 1
  refit: true
  seed: 42
  verbose: 0  
  direction: minimize

results:
  output_path: ./results
  metric: sklearn.metrics.root_mean_squared_error
  bootstrap_on_val: true
  display_parity_plot: true
  
param_space:
  data_representation:
    fp_1: {fp_name_or_path: AvalonFingerprint_1024}
  model:
    torch_models.FastPLMLPRegressor:
      random_state: [42]
      hidden_layer_sizes:
        - [1024, 1024]
      learning_rate:
        type: float
        low: 0.0001
        high: 0.1
        log: true
      weight_decay:
        type: float
        low: 0.00001
        high: 1.0
        log: true
      dropout_rate: [0.0, 0.25, 0.5]
      batch_size: [32]
      activation: [relu]
      